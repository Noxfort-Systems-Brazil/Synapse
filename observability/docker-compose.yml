version: '3.8'

services:
  prometheus:
    image: prom/prometheus:latest
    container_name: synapse-prometheus
    restart: unless-stopped
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus_data:/prometheus
    ports:
      - "9090:9090"
    extra_hosts:
      # Allows Prometheus to reach the host machine where Synapse is running
      - "host.docker.internal:host-gateway"

  grafana:
    image: grafana/grafana:latest
    container_name: synapse-grafana
    restart: unless-stopped
    depends_on:
      - prometheus
    volumes:
      - grafana_data:/var/lib/grafana
      - ./grafana/provisioning/datasources:/etc/grafana/provisioning/datasources
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=synapse123 # Default password, user: admin

  tensorboard:
    image: tensorflow/tensorflow:latest-jupyter
    container_name: synapse-tensorboard
    restart: unless-stopped
    ports:
      - "6006:6006"
    volumes:
      # Bind mounts the host's Checkpoint/Logs directory to the TensorBoard server
      - ~/.local/share/synapse/logs/tensorboard:/tensorboard_logs
    command: tensorboard --logdir /tensorboard_logs --host 0.0.0.0

volumes:
  prometheus_data:
  grafana_data:
